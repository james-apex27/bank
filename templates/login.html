<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Bank of Apex27</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; }
    .login-card { max-width: 420px; border: none; border-radius: 12px; }
    .login-header { background: #0a2d4d; border-radius: 12px 12px 0 0; }
  </style>
</head>
<body>
<div class="min-vh-100 d-flex align-items-center justify-content-center px-3">
  <div class="w-100" style="max-width:420px;">
    <div class="card shadow login-card">
      <div class="login-header text-white text-center py-4 px-4">
        <i class="bi bi-bank2 d-block mb-2" style="font-size:2.5rem;"></i>
        <h4 class="mb-0 fw-bold">Bank of Apex27</h4>
        <p class="mb-0 small opacity-75 mt-1">Sign in to your account</p>
      </div>
      <div class="card-body p-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="post">
          <input type="hidden" name="next" value="{{ next }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" class="form-control" name="email" placeholder="you@example.com"
                   autofocus required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
